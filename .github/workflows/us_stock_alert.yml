name: US Stock Scanner

on:
  schedule:
    # 미국 동부시간 기준 장중 실행용
    # UTC 월~금 13:35~20:55, 5분마다
    - cron: "*/5 13-20 * * 1-5"

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run US stock scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python stock_bot.py

      - name: Save signal state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add signal_state.json
          git commit -m "Update US stock signal state" || echo "No state changes"
          git push