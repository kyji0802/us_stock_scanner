name: US Stock Scanner

on:
  schedule:
    # 평일 UTC 기준 13:07~21:52
    # 약 15분마다 실행
    - cron: "7,22,37,52 13-21 * * 1-5"

  workflow_dispatch:

concurrency:
  group: us-stock-scanner
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run US stock scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python stock_bot.py

      - name: Save signal state
        if: always()
        run: |
          if [ -f signal_state.json ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add signal_state.json
            git commit -m "Update US stock signal state" || echo "No state changes"
            git push
          else
            echo "signal_state.json not found"
          fi